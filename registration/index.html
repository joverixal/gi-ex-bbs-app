<!DOCTYPE html>
<html>
<head>
<title>Ge-iX FR App - ANHS Alumni Run 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#E41200">
<link rel="icon" type="image/png" href="../assets/images/app-icon.png">

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="../assets/vendor/bootstrap.min.css">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="../assets/vendor/bootstrap-icons.css">
<!-- Toastr CSS -->
<link rel="stylesheet" href="../assets/vendor/toastr.min.css">
<link rel="stylesheet" href="../assets/css/footer.css">

<!-- jQuery -->
<script src="../assets/vendor/jquery.min.js"></script>
<!-- Include jQuery Mask Plugin -->
<script src="../assets/vendor/jquery.mask.min.js"></script>
<!-- Bootstrap JS -->
<script src="../assets/vendor/bootstrap.bundle.min.js"></script>
<!-- Toastr JS -->
<script src="../assets/vendor/toastr.min.js"></script>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/registration.js"></script>

<style>
  body {
    background: linear-gradient(135deg, #7A2BE2, #00B7C2);
    min-height: 100vh;
  }
  .container {
    background: #ffffff;
    border-radius: 1rem;
    padding: 1.5rem;
  }

.register-card {
  width: 100%;
  max-width: 700px;
  border-radius: 1rem;
  padding: 2rem;
  border-top: 5px solid #E41200;
  background: #fff;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  overflow: hidden;
}

.register-logo {
  width: 90px;
  margin-bottom: 10px;
}

.register-title {
  color: #5A1FAF;
  font-weight: 700;
}

.register-btn {
  background: linear-gradient(135deg, #7A2BE2, #00B7C2) !important;
  color: #fff !important;
  border: none;
}

.register-btn:hover {
  opacity: 0.9;
}
.register-btn:active, .register-btn:focus{ background:#cc8400 !important; transform: scale(0.97); }

.form-floating input, .form-floating select { height:50px; font-size:1rem; }

.form-control:focus {
  border-color: #00B7C2;
  box-shadow: 0 0 0 0.2rem rgba(0,183,194,0.25);
}

@media (max-width: 576px) {
  .form-floating input,
  .form-floating select {
    font-size: 0.9rem;
    height: 45px;
  }

  .row.g-3 {
    --bs-gutter-x: 0.5rem;
    --bs-gutter-y: 0.5rem;
  }
}

.step-indicator {
  width: 30px; height:30px;
  border-radius:50%; line-height:30px;
  background:#ccc; color:#fff; font-weight:600; text-align:center;
}
.step-indicator.active { background:#7A2BE2; }
.step-indicator.completed { background:#00B7C2; }
.tab-pane { display:none; }
.tab-pane.active { display:block; }

</style>
</head>

<body>

<div class="container py-4" style="max-width:700px;">
  <div class="text-center mb-4">
    <img src="../assets/images/anhs-2011-logo.png" class="register-logo" alt="ANHS 2011">
    <h3 class="register-title">ANHS Alumni Run 2026</h3>
  </div>

  <!-- Step Indicators -->
  <div class="d-flex justify-content-between mb-4">
    <div class="step-indicator active" data-step="1">1</div>
    <div class="step-indicator" data-step="2">2</div>
    <div class="step-indicator" data-step="3">3</div>
    <div class="step-indicator" data-step="4">4</div>
  </div>

  <form id="frm-registration">

    <!-- Tab 1: Basic Info -->
    <div class="tab-pane active" id="tab-basic">
      <div class="row g-3">
        <div class="col-6">
          <div class="form-floating">
            <input type="text" id="inp-firstname" class="form-control" placeholder="First name" required>
            <label for="inp-firstname">First name<span class="text-danger">*</span></label>
          </div>
        </div>
        <div class="col-6">
          <div class="form-floating">
            <input type="text" id="inp-lastname" class="form-control" placeholder="Last name" required>
            <label for="inp-lastname">Last name<span class="text-danger">*</span></label>
          </div>
        </div>
        <div class="col-6">
          <div class="form-floating">
            <select id="sel-gender" class="form-control" required>
              <option value="" selected disabled>Select Gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
            <label for="sel-gender">Gender<span class="text-danger">*</span></label>
          </div>
        </div>
        <div class="col-6">
          <div class="form-floating">
            <input type="date" id="inp-birthdate" class="form-control" placeholder="Birthdate" required>
            <label for="inp-birthdate">Birthdate<span class="text-danger">*</span></label>
          </div>
        </div>
        <div class="col-6">
          <div class="form-floating">
            <input type="text" id="inp-contact" class="form-control" placeholder="Contact number" required>
            <label for="inp-contact">Contact number<span class="text-danger">*</span></label>
          </div>
        </div>
        <div class="col-6">
          <div class="form-floating">
            <select id="sel-batch-year" class="form-control" required></select>
            <label for="sel-batch-year">Batch Year<span class="text-danger">*</span></label>
          </div>
        </div>
        <div class="col-12">
          <div class="form-floating">
            <input type="text" id="inp-address" class="form-control" placeholder="Address" required>
            <label for="inp-address">Address<span class="text-danger">*</span></label>
          </div>
        </div>
        <div class="col-6">
          <div class="form-floating">
            <select id="sel-tshirt" class="form-control" required>
              <option value="" selected disabled>Select T-Shirt size</option>
              <option value="S">S</option>
              <option value="M">M</option>
              <option value="L">L</option>
              <option value="XL">XL</option>
              <option value="XXL">XXL</option>
            </select>
            <label for="sel-tshirt">T-Shirt Size<span class="text-danger">*</span></label>
          </div>
        </div>
      </div>
      <div class="mt-4 text-end">
        <button type="button" class="btn register-btn" id="btn-next-basic">Next</button>
      </div>
    </div>

    <!-- Tab 2: Ride Category -->
    <div class="tab-pane" id="tab-ride">
      <h5>Select your Ride Category</h5>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="rideCategory" id="ride3km" value="3km" required>
        <label class="form-check-label" for="ride3km">3km Fun Run</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="rideCategory" id="ride6km" value="6km" required>
        <label class="form-check-label" for="ride6km">6km Run</label>
      </div>
      <div class="mt-4 d-flex justify-content-between">
        <button type="button" class="btn btn-secondary" id="btn-back-ride">Back</button>
        <button type="button" class="btn register-btn" id="btn-next-ride">Next</button>
      </div>
    </div>

    <!-- Tab 3: Payment -->
    <div class="tab-pane text-center" id="tab-payment">
      <h5>Scan the QR Code to pay via GCash</h5>
      <img src="../assets/images/gcash-qr.png" class="img-fluid my-3" style="max-width:250px;">
      <div class="form-floating mb-3">
        <input type="file" id="inp-payment-file" class="form-control" accept="image/*" required>
        <label for="inp-payment-file">Upload Payment Proof<span class="text-danger">*</span></label>
      </div>
      <div class="d-flex justify-content-between">
        <button type="button" class="btn btn-secondary" id="btn-back-payment">Back</button>
        <button type="button" class="btn register-btn" id="btn-next-payment">Next</button>
      </div>
    </div>

    <!-- Tab 4: Success -->
    <div class="tab-pane text-center" id="tab-success">
      <h4 class="text-success">Pre-Registration Successful!</h4>
      <p>Thank you for registering. Please wait for verification and further instructions.</p>
    </div>

  </form>
</div>

<div id="footer-placeholder"></div>
<script src="../assets/js/loadFooter.js"></script>

<script>
</script>

</body>
</html>
