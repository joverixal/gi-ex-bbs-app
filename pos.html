<!DOCTYPE html>
<html>
<head>
<title>POS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#E41200">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="assets/images/logo.png">

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="assets/vendor/bootstrap.min.css">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="assets/vendor/bootstrap-icons.css">
<!-- Toastr CSS -->
<link rel="stylesheet" href="assets/vendor/toastr.min.css">

<!-- jQuery -->
<script src="assets/vendor/jquery.min.js"></script>
<!-- Bootstrap JS -->
<script src="assets/vendor/bootstrap.bundle.min.js"></script>
<!-- Toastr JS -->
<script src="assets/vendor/toastr.min.js"></script>

<script src="assets/js/config.js"></script>
<script src="assets/js/pos.js"></script>

<style>
:root{ --primary:#E41200; --secondary:#FFA600; }
.form-control:focus, .form-select:focus{ border-color: var(--secondary); box-shadow: 0 0 0 0.2rem rgba(255,166,0,0.25);}
#inp-amount-due{ color: var(--primary) !important; }
#btn-cash{ background: var(--secondary); border:none; font-weight:600; }
#btn-cash:hover{ background:#e69500; }
.bottom-nav a{ display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0.5rem; color:#6c757d; font-size:0.85rem; }
.bottom-nav a.active{ color:var(--primary); }
.bottom-nav i{ font-size:1.5rem; margin-bottom:0.2rem; }
#div-added-items{ display:flex; flex-direction:column; gap:0.5rem; max-height:230px; overflow-y:auto; }
</style>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(()=>console.log("SW registered"))
    .catch(err=>console.log(err))
}
if(!localStorage.getItem("isLoggedIn")){
  window.location.href="index.html"
}
</script>
</head>
<body>

<div class="container py-3 mb-5">

<select id="sel-products" class="form-select mb-3" disabled>
<option>Loading...</option>
</select>

<div id="div-added-items"></div>

<div class="form-floating mb-3">
<input type="number" id="inp-amount-due" class="form-control text-center fw-bold" readonly>
<label>Amount Due</label>
</div>

<div class="mb-3">
<label class="form-label fw-semibold">Cash Received</label>
<div class="input-group">
<input type="number" id="inp-cash-received" class="form-control">
<button class="btn btn-outline-secondary" id="btn-clear-cash">✕</button>
</div>
</div>

<div class="form-floating mb-3">
<input type="number" id="inp-changed" class="form-control" readonly>
<label>Change</label>
</div>

<button id="btn-cash" class="btn w-100 mb-2">Cash</button>
<button id="btn-credit" class="btn btn-secondary w-100">Credit</button>

</div>

<nav class="navbar fixed-bottom bg-white border-top">
<div class="container d-flex justify-content-around bottom-nav">
<a href="pos.html" id="nav-pos"><i class="bi bi-cash-stack"></i> POS</a>
<a href="products.html" id="nav-products"><i class="bi bi-box-seam"></i> Products</a>
<div><img src="assets/images/logo.png" style="height:40px"></div>
<a href="sales.html" id="nav-sales"><i class="bi bi-receipt"></i> Sales</a>
<a href="#" id="nav-logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>
</nav>

</body>
</html>
