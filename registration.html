<!DOCTYPE html>
<html>
<head>
<title>Ge-iX FR App - ANHS Alumni Run 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E41200">
<link rel="icon" type="image/png" href="assets/images/app-icon.png">

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="assets/vendor/bootstrap.min.css">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="assets/vendor/bootstrap-icons.css">
<!-- Toastr CSS -->
<link rel="stylesheet" href="assets/vendor/toastr.min.css">
<link rel="stylesheet" href="assets/css/footer.css">

<!-- jQuery -->
<script src="assets/vendor/jquery.min.js"></script>
<!-- Bootstrap JS -->
<script src="assets/vendor/bootstrap.bundle.min.js"></script>
<!-- Toastr JS -->
<script src="assets/vendor/toastr.min.js"></script>
  
<script src="assets/js/config.js"></script>
<script src="assets/js/registration.js"></script>

<style>
body {
  background: linear-gradient(135deg, #7A2BE2, #00B7C2);
  min-height: 100vh;
}

/* container */
.form-wrapper {
  max-width: 720px;
  margin: auto;
  background: #fff;
  border-radius: 1rem;
  padding: 1.5rem;
  margin-top: 20px;
}

/* title */
.register-title {
  color: #5A1FAF;
  font-weight: 700;
}

/* button */
.register-btn {
  background: linear-gradient(135deg, #7A2BE2, #00B7C2);
  color: #fff;
  border: none;
  font-weight: 600;
}

/* focus */
.form-control:focus,
.form-select:focus {
  border-color: #00B7C2;
  box-shadow: 0 0 0 0.2rem rgba(0,183,194,0.25);
}

/* mobile tweaks */
@media (max-width: 576px) {
  .row {
    --bs-gutter-x: 0.5rem;
    --bs-gutter-y: 0.5rem;
  }

  .form-floating input,
  .form-floating select {
    height: 45px;
    font-size: 0.9rem;
  }
}
</style>
</head>

<body>

<div class="form-wrapper">

  <div class="text-center mb-3">
    <img src="assets/images/anhs-2011-logo.png" width="80">
    <h4 class="register-title mt-2">ANHS Alumni Run 2026</h4>
  </div>

  <div class="row g-2">

    <!-- First Name -->
    <div class="col-6">
      <div class="form-floating">
        <input type="text" class="form-control" placeholder=" " required>
        <label>First Name *</label>
      </div>
    </div>

    <!-- Last Name -->
    <div class="col-6">
      <div class="form-floating">
        <input type="text" class="form-control" placeholder=" " required>
        <label>Last Name *</label>
      </div>
    </div>

    <!-- Gender -->
    <div class="col-6">
      <div class="form-floating">
        <select class="form-select" required>
          <option value="" disabled selected></option>
          <option>Male</option>
          <option>Female</option>
        </select>
        <label>Gender *</label>
      </div>
    </div>

    <!-- Birthdate (no floating = better UX) -->
    <div class="col-6">
      <label class="form-label mb-1">Birthdate *</label>
      <input type="date" class="form-control" required>
    </div>

    <!-- Contact -->
    <div class="col-6">
      <div class="form-floating">
        <input type="text" class="form-control" placeholder=" " required>
        <label>Contact Number</label>
      </div>
    </div>

    <!-- Address (full width = better UX) -->
    <div class="col-12">
      <div class="form-floating">
        <input type="text" class="form-control" placeholder=" " required>
        <label>Address</label>
      </div>
    </div>

    <!-- Batch Year -->
    <div class="col-6">
      <div class="form-floating">
        <input type="text" class="form-control" placeholder=" ">
        <label>Batch Year</label>
      </div>
    </div>

    <!-- T-Shirt -->
    <div class="col-6">
      <div class="form-floating">
        <select class="form-select">
          <option value="" disabled selected></option>
          <option>S</option>
          <option>M</option>
          <option>L</option>
          <option>XL</option>
          <option>XXL</option>
        </select>
        <label>T-Shirt Size *</label>
      </div>
    </div>

  </div>

  <button class="btn register-btn w-100 mt-3 py-2">
    <i class="bi bi-person-plus me-2"></i> Register
  </button>

</div>

<div id="footer-placeholder"></div>
<script src="assets/js/loadFooter.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(()=>console.log("SW registered"))
    .catch(err=>console.log(err))
}
</script>

</body>
</html>
